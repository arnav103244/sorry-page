<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#ffe6e6;
    padding-top:100px;
}

#yesBtn,#noBtn{
    padding:12px 25px;
    font-size:20px;
    border:none;
    border-radius:10px;
    margin:10px;
    cursor:pointer;
}

#yesBtn{
    background:#4CAF50;
    color:white;
}

#noBtn{
    background:#f44336;
    color:white;
}
</style>
</head>

<body>

<h1>I'm Sorry ❤️</h1>
<h2>Will you forgive me?</h2>

<button id="yesBtn">Yes 💖</button>
<button id="noBtn">No 😢</button>

<script>
document.getElementById("yesBtn").onclick = function() {
    document.body.innerHTML =
    "<h1>YAY! ❤️</h1><h2>Thank you for forgiving me 🥰</h2><p>I will never hurt you again.</p>";
};

document.getElementById("noBtn").onclick = function() {
    alert("Please think again 🥺❤️");
};
</script>

</body>
</html>
