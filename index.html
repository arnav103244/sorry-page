<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffe6e6;
    text-align:center;
    overflow:hidden;
    margin-top:100px;
}

h1{
    color:#ff4d4d;
}

button{
    padding:12px 25px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:10px;
}

#yesBtn{
    background:#4CAF50;
    color:white;
}

#noBtn{
    background:#f44336;
    color:white;
    position:absolute;
}
</style>
</head>

<body>

<h1>I'm Sorry ❤️</h1>
<h2>Will you forgive me?</h2>

<button id="yesBtn">Yes 💖</button>
<button id="noBtn">No 😢</button>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

let size = 20;

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 120);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    size += 5;
    yesBtn.style.fontSize = size + "px";
});

yesBtn.addEventListener("click", () => {

    const form = document.createElement("form");
    form.method = "POST";
    form.action = "https://docs.google.com/forms/d/e/1FAIpQLSfx3Qvgds-IJvZKOt80wzI8b3bWsbiDAROaue8A4shr2m6nRg/formResponse";
    form.target = "hidden_iframe";

    const input = document.createElement("input");
    input.type = "hidden";
    input.name = "entry.1433162080";
    input.value = "Yes";

    form.appendChild(input);
    document.body.appendChild(form);
    form.submit();

    document.body.innerHTML = `
        <h1>YAY! ❤️</h1>
        <h2>Thank you for forgiving me baby 🥰</h2>
        <p>I will never hurt you again, baccha and plzz tell allow me to msg you 😭😭!</p>
        <h3>❤️ ❤️ ❤️</h3>
    `;
});

window.onload = () => {
    noBtn.style.left = "55%";
    noBtn.style.top = "55%";
};
</script>

</body>
</html>
