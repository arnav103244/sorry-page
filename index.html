<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffe6e6;
    text-align:center;
    overflow:hidden;
    margin-top:100px;
}

h1{
    color:#ff4d4d;
}

button{
    padding:12px 25px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:10px;
}

#yesBtn{
    background:#4CAF50;
    color:white;
}

#noBtn{
    background:#f44336;
    color:white;
    position:absolute;
}
</style>
</head>

<body>

<h1>I'm Sorry ❤️</h1>
<h2>Will you forgive me?</h2>

<button id="yesBtn">Yes 💖</button>
<button id="noBtn">No 😢</button>

<script>
const FORM_URL =
"https://docs.google.com/forms/d/e/1FAIpQLSfx3Qvgds-IJvZKOt80wzI8b3bWsbiDAROaue8A4shr2m6nRg/formResponse";

const FIELD_ID = "entry.1433162080";

function submitAnswer(answer){
    fetch(FORM_URL,{
        method:"POST",
        mode:"no-cors",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:`${FIELD_ID}=${encodeURIComponent(answer)}`
    });
}

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

let size = 20;

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 120);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    size += 5;
    yesBtn.style.fontSize = size + "px";
});

yesBtn.addEventListener("click", () => {
    submitAnswer("Yes");

    document.body.innerHTML = `
        <h1>YAY! ❤️</h1>
        <h2>Thank you for forgiving me 🥰</h2>
        <p>You made my day!</p>
    `;
});
</script>

</body>
</html>
